<VirtualHost *:80>
    ServerName {{SITE_DOMAIN}}
    ServerAlias www.{{SITE_DOMAIN}}
    ServerAdmin {{ADMIN_EMAIL}}
    Redirect permanent / https://{{SITE_DOMAIN}}/
</VirtualHost>

<VirtualHost *:443>
    ServerAdmin {{ADMIN_EMAIL}}
    ServerName {{SITE_DOMAIN}}
    ServerAlias www.{{SITE_DOMAIN}}
    DocumentRoot {{DOC_ROOT}}/

    SSLEngine on
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLHonorCipherOrder off
    SSLSessionTickets off
    SSLUseStapling on

    SSLCertificateFile      /etc/ssl/certs/{{SITE_DOMAIN}}.crt
    SSLCertificateKeyFile   /etc/ssl/private/{{SITE_DOMAIN}}.key
    SSLCertificateChainFile /etc/ssl/certs/{{SITE_DOMAIN}}.ca-bundle

    ErrorLog  ${APACHE_LOG_DIR}/{{SITE_DOMAIN}}_ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/{{SITE_DOMAIN}}_ssl_access.log combined

    <Directory {{DOC_ROOT}}>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>

    <Directory "{{DOC_ROOT}}/wp-content/uploads">
        <FilesMatch "\.php$">
            Require all denied
        </FilesMatch>
    </Directory>

    <IfModule mod_security2.c>
        SecRuleEngine On
        SecAuditLog ${APACHE_LOG_DIR}/{{SITE_DOMAIN}}.log
    </IfModule>
</VirtualHost>