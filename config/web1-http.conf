<VirtualHost *:80>
    ServerName {{SITE_DOMAIN}}
    ServerAlias www.{{SITE_DOMAIN}}
    ServerAdmin {{ADMIN_EMAIL}}
    DocumentRoot {{DOC_ROOT}}/
 
    ErrorLog  ${APACHE_LOG_DIR}/{{SITE_DOMAIN}}_error.log
    CustomLog ${APACHE_LOG_DIR}/{{SITE_DOMAIN}}_access.log combined
 
    <Directory {{DOC_ROOT}}>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>
 
    <Directory "{{DOC_ROOT}}/wp-content/uploads">
        <FilesMatch "\.php$">
            Require all denied
        </FilesMatch>
    </Directory>
 
    <IfModule mod_security2.c>
        SecRuleEngine On
        SecAuditLog ${APACHE_LOG_DIR}/{{SITE_DOMAIN}}_modsec.log
    </IfModule>
</VirtualHost>
 
